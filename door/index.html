          <!DOCTYPE html>
<html lang="zh-CN">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', 'Ma Shan Zheng', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #a8d8ea 0%, #ffb6c1 50%, #ffc0cb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sakura-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .sakura {
      position: absolute;
      width: 15px;
      height: 15px;
      background: linear-gradient(135deg, #fff0f5, #ffb6c1);
      border-radius: 50% 0 50% 50%;
      opacity: 0.8;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg) translateX(0);
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) rotate(720deg) translateX(100px);
        opacity: 0;
      }
    }

    .gate-container {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .door-frame {
      position: relative;
      width: 200px;
      height: 300px;
      margin: 0 auto;
      perspective: 1000px;
    }

    .door {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #8b4513 0%, #654321 100%);
      border-radius: 100px 100px 0 0;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.3), 0 0 30px rgba(0,0,0,0.2);
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 1.5s ease-in-out;
      transform-origin: left center;
    }

    .door::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 10%;
      width: 80%;
      height: 80%;
      background: linear-gradient(180deg, #a0522d 0%, #8b4513 100%);
      border-radius: 90px 90px 0 0;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
    }

    .door::after {
      content: '';
      position: absolute;
      right: 20px;
      top: 50%;
      width: 15px;
      height: 15px;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255,215,0,0.5);
    }

    .door-frame.open .door {
      transform: rotateY(-110deg);
    }

    .door-handle {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(255,215,0,0.8);
      z-index: 5;
      transition: all 0.3s ease;
    }

    .door-frame.open .door-handle {
      opacity: 0;
    }

    .title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      color: #fff;
      text-shadow: 3px 3px 10px rgba(0,0,0,0.3), 0 0 30px rgba(255,182,193,0.8);
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeInDown 1s ease forwards 0.5s;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .subtitle {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.9);
      text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeInDown 1s ease forwards 0.8s;
    }

    .click-hint {
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
      opacity: 0;
      animation: pulse 2s ease-in-out infinite, fadeInDown 1s ease forwards 1.2s;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    .blog-link {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0;
      cursor: pointer;
    }

    .clouds {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      filter: blur(20px);
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateX(-100px);
      }
      100% {
        transform: translateX(calc(100vw + 100px));
      }
    }
  </style>
</head>
<body>
  <div class="clouds">
    <div class="cloud" style="width: 200px; height: 80px; top: 10%; animation-duration: 60s;"></div>
    <div class="cloud" style="width: 150px; height: 60px; top: 25%; animation-duration: 45s; animation-delay: -20s;"></div>
    <div class="cloud" style="width: 180px; height: 70px; top: 5%; animation-duration: 55s; animation-delay: -35s;"></div>

  <div class="sakura-container" id="sakuraContainer"></div>

  <div class="gate-container">
    <h1 class="title">🌸 Sakura的个人博客 🌸</h1>
    <p class="subtitle">欢迎来到我的小天地~</p>

    <div class="door-frame" id="doorFrame">
      <div class="door"></div>
      <div class="door-handle"></div>
      <a href="/home/" class="blog-link" id="blogLink"></a>
    </div>

    <p class="click-hint">✨ 点击木门进入博客 ✨</p>
  </div>

  <script>
    function createSakura() {
      var container = document.getElementById('sakuraContainer');
      var sakura = document.createElement('div');
      sakura.className = 'sakura';

      var startX = Math.random() * window.innerWidth;
      var duration = 8 + Math.random() * 6;
      var size = 8 + Math.random() * 10;

      sakura.style.left = startX + 'px';
      sakura.style.width = size + 'px';
      sakura.style.height = size + 'px';
      sakura.style.animationDuration = duration + 's';
      sakura.style.animationDelay = Math.random() * 2 + 's';

      container.appendChild(sakura);

      setTimeout(function() {
        sakura.remove();
      }, (duration + 2) * 1000);
    }

    setInterval(createSakura, 300);

    for (var i = 0; i < 15; i++) {
      setTimeout(createSakura, i * 200);
    }

    var doorFrame = document.getElementById('doorFrame');
    var blogLink = document.getElementById('blogLink');

    doorFrame.addEventListener('click', function() {
      doorFrame.classList.add('open');

      setTimeout(function() {
        window.location.href = '/home/';
      }, 800);
    });
  </script>
</body>

<!-- 樱花飘落效果 -->
<style>
  .sakura-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 9999;
  }

  .sakura {
    position: absolute;
    width: 12px;
    height: 12px;
    background: linear-gradient(135deg, #FFB7C5 0%, #FFD6E0 100%);
    border-radius: 50% 0 50% 50%;
    opacity: 0.8;
    animation: fall linear infinite;
    box-shadow: 0 0 4px rgba(255, 183, 197, 0.6);
  }

  .sakura::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #FFD6E0 0%, #FFB7C5 100%);
    border-radius: 50% 0 50% 50%;
    transform: rotate(45deg);
  }

  @keyframes fall {
    0% {
      transform: translateY(-20px) rotate(0deg) translateX(0);
      opacity: 0;
    }
    10% {
      opacity: 0.8;
    }
    90% {
      opacity: 0.6;
    }
    100% {
      transform: translateY(100vh) rotate(720deg) translateX(100px);
      opacity: 0;
    }
  }

  .sakura:nth-child(odd) {
    animation-duration: 8s;
    animation-delay: 0s;
  }

  .sakura:nth-child(even) {
    animation-duration: 10s;
    animation-delay: 2s;
  }

  .sakura:nth-child(3n) {
    animation-duration: 12s;
    animation-delay: 4s;
  }

  .sakura:nth-child(3n+1) {
    width: 8px;
    height: 8px;
    animation-duration: 9s;
  }

  .sakura:nth-child(3n+2) {
    width: 10px;
    height: 10px;
    animation-duration: 11s;
  }

  .sakura.small {
    width: 6px;
    height: 6px;
  }

  .sakura.large {
    width: 16px;
    height: 16px;
    animation-duration: 14s;
  }
</style>

<div class="sakura-container" id="sakura-container"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var container = document.getElementById('sakura-container');
  var sakuraCount = 25; // 樱花数量

  for (var i = 0; i < sakuraCount; i++) {
    var sakura = document.createElement('div');
    sakura.className = 'sakura';
    
    // 随机大小
    var size = Math.random() * 3;
    if (size < 1) {
      sakura.classList.add('small');
    } else if (size > 2) {
      sakura.classList.add('large');
    }
    
    // 随机水平位置
    sakura.style.left = Math.random() * 100 + '%';
    
    // 随机延迟
    sakura.style.animationDelay = Math.random() * 10 + 's';
    
    // 随机动画持续时间
    sakura.style.animationDuration = (8 + Math.random() * 6) + 's';
    
    // 随机摇摆幅度
    sakura.style.setProperty('--swing', (Math.random() * 200 - 100) + 'px');
    
    container.appendChild(sakura);
  }
});
</script>

</body>
</html>
