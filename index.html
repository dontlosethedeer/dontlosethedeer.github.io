<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakura的个人博客</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', 'Ma Shan Zheng', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #a8d8ea 0%, #ffb6c1 50%, #ffc0cb 100%);
      padding: 40px 20px;
    }

    .timeline-container {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      padding: 20px 0;
    }

    .timeline-container::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
      border-radius: 2px;
    }

    .timeline-title {
      text-align: center;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2.5rem;
      color: #fff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
      margin-bottom: 50px;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 40px;
      display: flex;
    }

    .timeline-item:nth-child(odd) {
      flex-direction: row-reverse;
    }

    .timeline-dot {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(255,154,158,0.4);
      z-index: 2;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .timeline-dot:hover {
      transform: translateX(-50%) scale(1.2);
      box-shadow: 0 6px 25px rgba(255,154,158,0.6);
    }

    .timeline-dot i {
      color: #fff;
      font-size: 1.2rem;
    }

    .timeline-content {
      width: 45%;
      padding: 20px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .timeline-content:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    .timeline-content a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .timeline-date {
      font-size: 0.9rem;
      color: #ff9a9e;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .timeline-post-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.5rem;
      color: #5c5c5c;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timeline-post-title i {
      color: #ffb6c1;
    }

    .timeline-excerpt {
      font-size: 0.95rem;
      color: #888;
      line-height: 1.6;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .timeline-meta {
      display: flex;
      gap: 15px;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .timeline-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .back-door {
      display: block;
      text-align: center;
      margin: 40px auto;
      padding: 15px 40px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1.1rem;
      box-shadow: 0 5px 20px rgba(255,154,158,0.4);
      transition: all 0.3s ease;
      width: fit-content;
    }

    .back-door:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(255,154,158,0.5);
    }

    @media (max-width: 768px) {
      .timeline-container::before {
        left: 20px;
      }

      .timeline-item {
        flex-direction: column !important;
        padding-left: 60px;
      }

      .timeline-dot {
        left: 20px;
      }

      .timeline-content {
        width: 100%;
      }
    }

    .sakura-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .sakura-petal {
      position: absolute;
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #fff0f5, #ffb6c1);
      border-radius: 50% 0 50% 50%;
      opacity: 0.6;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 0.6;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #fff;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .empty-state h2 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 1.1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <script>
    function createSakura() {
      var container = document.getElementById('sakuraBg');
      if (!container) return;
      var petal = document.createElement('div');
      petal.className = 'sakura-petal';

      var startX = Math.random() * window.innerWidth;
      var duration = 10 + Math.random() * 5;
      var size = 8 + Math.random() * 8;

      petal.style.left = startX + 'px';
      petal.style.width = size + 'px';
      petal.style.height = size + 'px';
      petal.style.animationDuration = duration + 's';

      container.appendChild(petal);

      setTimeout(function() {
        petal.remove();
      }, (duration + 1) * 1000);
    }

    setInterval(createSakura, 400);
    for (var i = 0; i < 10; i++) {
      setTimeout(createSakura, i * 300);
    }
  </script>
